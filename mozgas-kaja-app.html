  .motif{position:fixed;left:0;right:0;bottom:0;height:60vh;z-index:0;pointer-events:none;background-repeat:no-repeat;background-position:bottom center;background-size:contain;opacity:.8;transition:opacity .35s, background-image .35s;}
  .app{position:relative;z-index:2;display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;}
  header{padding:13px 18px 2px;flex:none;}
  .toprow{display:flex;align-items:center;justify-content:space-between;}
  .eyebrow{font-size:9.5px;letter-spacing:3px;color:var(--petrol);text-transform:uppercase;font-weight:600;}
  .stamp{width:30px;height:30px;border:2px solid var(--petrol);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--petrol);font-size:16px;opacity:.85;}
  #titleimg{height:50px;width:auto;display:block;margin:3px 0 0 -2px;}
  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 16px 16px;}
  .hidden{display:none;}
  .view{animation:fade .26s ease;}
  @keyframes fade{from{opacity:0;transform:translateX(var(--dir,0))}to{opacity:1;transform:none}}
  .weeknav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 8px;margin:4px 0 8px;}
  .weeknav button{background:none;border:none;font-size:21px;color:var(--petrol);font-weight:700;padding:0 14px;cursor:pointer;line-height:1;}
  .wlabel{font-weight:700;font-size:13px;text-align:center;}
  .wsub{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;}
  .day{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid rgba(211,196,156,.6);}
  .day:last-of-type{border-bottom:none;}
  .day.rest .dtag{background:#b1a784;}
  .dtag{font-family:'Space Grotesk';font-weight:700;font-size:11px;letter-spacing:.5px;color:#fff;background:var(--ink);
    padding:5px 0;width:46px;text-align:center;border-radius:6px;text-transform:uppercase;flex:none;height:fit-content;margin-top:2px;}
  .dtag.hard{background:var(--petrol);}
  .day.today .dtag{box-shadow:0 0 0 2px var(--ochre);}
  .day.today .dtag::after{content:"ma";display:block;font-size:7px;letter-spacing:1px;color:var(--ochre);background:#fff;border-radius:3px;margin-top:2px;}
  .tasks{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
  .taskwrap{position:relative;border-radius:9px;overflow:hidden;}
  .trash{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:14px;background:linear-gradient(90deg,rgba(185,83,58,0),rgba(185,83,58,.16) 60%);opacity:0;transition:opacity .12s;}
  .taskwrap.swiping .trash{opacity:1;}
  .taskfg{position:relative;display:flex;align-items:flex-start;gap:10px;background:transparent;touch-action:pan-y;transition:transform .16s;}
  .cbx{width:26px;height:26px;border:2px solid var(--petrol);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;background:transparent;cursor:pointer;flex:none;margin-top:1px;transition:transform .1s, background .15s;}
  .cbx.on{background:var(--petrol);}
  .cbx:active{transform:scale(.85);}
  .tmeta{flex:1;min-width:0;}
  .tname{font-weight:600;font-size:13px;line-height:1.2;}
  .tset{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.35;}
  .taskfg.skip .tname,.taskfg.skip .tset{text-decoration:line-through;color:var(--muted);}
  .restore{border:none;background:none;color:var(--petrol);font-size:11px;font-weight:600;cursor:pointer;flex:none;margin-top:2px;display:flex;align-items:center;gap:3px;}
  .addbtn{width:27px;height:27px;border-radius:50%;border:1.6px dashed var(--petrol);background:rgba(13,74,86,.05);color:var(--petrol);font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;}
  .wkgoal{font-size:11px;color:var(--muted);margin-top:11px;text-align:center;}
  .wkgoal b{color:var(--petrol);font-size:13px;}
  .hint{font-size:10px;color:var(--muted);text-align:center;margin-top:3px;opacity:.85;}
  .datebar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 8px;margin:4px 0 10px;}
  .datebar button{background:none;border:none;font-size:20px;color:var(--petrol);font-weight:700;padding:0 14px;cursor:pointer;}
  .datebar b{font-size:13px;}
  .fcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px;margin-bottom:11px;box-shadow:0 3px 16px rgba(70,80,80,.06);}
  .ftop{display:flex;align-items:center;justify-content:space-between;}
  .flab{font-weight:700;font-size:14px;letter-spacing:.3px;text-transform:uppercase;color:var(--ink);}
  .fval{font-family:'Space Grotesk';font-weight:700;font-size:26px;color:var(--petrol);line-height:1;}
  .fval small{font-size:13px;color:var(--muted);font-weight:600;}
  .dots{display:flex;gap:6px;margin-top:9px;}
  .dot{flex:1;height:10px;border-radius:6px;background:var(--line);}
  .dot.on{background:var(--petrol);} .dot.water.on{background:var(--petrol2);} .dot.ca.on{background:var(--green);} .dot.co.on{background:var(--ochre);}
  .fctrls{display:flex;gap:8px;margin-top:9px;}
  .rnd{flex:1;height:38px;border-radius:10px;border:1.5px solid var(--line);background:rgba(255,255,255,.7);font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;}
  .rnd:active{transform:scale(.96);}
  .rnd.plus{border-color:var(--petrol);color:var(--petrol);} .rnd.green{border-color:var(--green);color:var(--green);}
  .examples{font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px;}
  .examples b{color:var(--ink);font-weight:600;}
  .cbreak{font-size:11px;margin-top:7px;} .cbreak .g{color:var(--green);font-weight:700;} .cbreak .o{color:#a87f1e;font-weight:700;}
  .banwrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
  .ban-item{font-size:12px;padding:5px 11px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.55);color:var(--muted);text-decoration:line-through;text-decoration-color:var(--rust);cursor:pointer;}
  .ban-item.slip{text-decoration:none;color:var(--rust);background:rgba(185,83,58,.1);border-color:var(--rust);font-weight:700;}
  .banhint{font-size:10.5px;color:var(--muted);margin-top:8px;}
  .seclabel{font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--petrol);margin:8px 2px 9px;display:flex;align-items:center;gap:8px;}
  .tick{width:16px;height:6px;background:var(--ochre);display:inline-block;transform:skewX(-18deg);}
  .chartcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px 16px 10px;margin-bottom:11px;}
  .charttop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .charttop .ct1{font-weight:700;font-size:13px;} .charttop .ct2{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .chart{position:relative;display:flex;gap:6px;align-items:flex-end;height:96px;padding-top:6px;}
  .cbar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%;}
  .cbar .b{width:74%;background:var(--petrol);border-radius:5px 5px 0 0;min-height:3px;opacity:.9;}
  .cbar.today .b{background:var(--ochre);}
  .cbar .l{font-size:9px;color:var(--muted);margin-top:4px;}
  .tline{position:absolute;left:0;right:0;border-top:1.5px dashed rgba(185,83,58,.55);}
  .tline span{position:absolute;right:0;top:-14px;font-size:8.5px;color:var(--rust);}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 14px;margin-bottom:9px;}
  .srow{display:flex;align-items:baseline;justify-content:space-between;}
  .sname{font-weight:700;font-size:13px;} .sval{font-family:'Space Grotesk';font-weight:700;font-size:19px;color:var(--petrol);}
  .ar.up{color:var(--green);}.ar.down{color:var(--rust);}.ar.flat{color:var(--muted);}
  .ssent{font-size:11.5px;color:var(--muted);line-height:1.4;margin-top:5px;}
  .mini{display:flex;gap:5px;align-items:flex-end;height:30px;margin-top:8px;}
  .mb{flex:1;background:var(--petrol);border-radius:4px 4px 0 0;min-height:3px;opacity:.85;}
  .mb.cur{background:var(--ochre);}
  .mbl{display:flex;gap:5px;margin-top:3px;}.mbl span{flex:1;text-align:center;font-size:8.5px;color:var(--muted);}
  .win{background:linear-gradient(135deg,rgba(13,74,86,.12),rgba(200,148,31,.14));border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:11px;}
  .win .w1{font-weight:700;font-size:13px;color:var(--petrol);}.win .w2{font-size:12.5px;margin-top:5px;}.win .w2 b{color:var(--rust);}
  .empty{font-size:12px;color:var(--muted);text-align:center;padding:12px;}
  .savelink{display:block;text-align:center;font-size:11px;color:var(--muted);margin-top:10px;text-decoration:underline;cursor:pointer;}
  nav{flex:none;display:flex;background:rgba(247,240,219,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}

  nav button .ic{font-size:17px;}
  nav button.active{color:var(--petrol);} nav button.active .ic{color:var(--ink);}
  nav button.active::after{content:"";position:absolute;bottom:3px;width:22px;height:3px;border-radius:3px;background:var(--ochre);}
  .toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:rgba(26,20,16,.86);color:#fff;font-size:11px;padding:6px 14px;border-radius:20px;z-index:30;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .overlay{position:fixed;inset:0;z-index:40;background:rgba(26,20,16,.42);display:flex;align-items:flex-end;}
  .overlay.hidden{display:none;}
  .sheet{background:#f4eed9;width:100%;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));max-height:74vh;overflow-y:auto;border:1px solid var(--line);}
  .sheet h3{font-weight:700;font-size:16px;letter-spacing:.5px;text-transform:uppercase;color:var(--petrol);margin-bottom:4px;}
  .sheet .sh-sub{font-size:11px;color:var(--muted);margin-bottom:12px;}
  .popt{display:flex;flex-direction:column;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;background:rgba(255,255,255,.6);cursor:pointer;}
  .popt b{font-size:13.5px;}.popt span{font-size:11px;color:var(--muted);margin-top:2px;}
  .cancel{text-align:center;padding:11px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;}
  svg.ic-trash{width:24px;height:24px;} svg.ic-ar{width:15px;height:15px;display:block;}
  .manem{color:var(--rust);font-weight:700;font-size:13px;letter-spacing:.5px;}
  .restore{display:inline-flex;align-items:center;gap:4px;line-height:1;border:none;background:none;color:var(--petrol);font-size:11px;font-weight:600;cursor:pointer;flex:none;margin-top:1px;}
  .tmeta{cursor:pointer;}
  .flab.fhead{cursor:pointer;}
  .flab .i{display:inline-flex;width:15px;height:15px;border:1.4px solid var(--muted);color:var(--muted);border-radius:50%;font-size:9px;align-items:center;justify-content:center;font-weight:700;margin-left:6px;vertical-align:2px;font-style:italic;}
  .seg{display:flex;gap:6px;margin-bottom:11px;}
  .seg button{flex:1;padding:7px 2px;border-radius:9px;border:1.5px solid var(--line);background:rgba(255,255,255,.55);font:600 11px 'Space Grotesk';color:var(--muted);cursor:pointer;}
  .seg button.on{border-color:var(--petrol);color:var(--petrol);background:rgba(13,74,86,.09);}
  .cbar.ban .b{background:var(--rust);}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(26,20,16,.5);display:flex;align-items:center;justify-content:center;padding:18px;}
  .modal.hidden{display:none;}
  .modalcard{background:#f5efdb;border:1px solid var(--line);border-radius:16px;max-width:430px;width:100%;max-height:84vh;overflow-y:auto;padding:18px 20px 22px;position:relative;box-shadow:0 14px 44px rgba(0,0,0,.28);}
  .modalcard h4{font-weight:700;font-size:17px;color:var(--ink);padding-right:32px;margin-bottom:3px;}
  .modalcard .msub{font-size:11px;color:var(--muted);margin-bottom:13px;}
  .mclose{position:absolute;top:12px;right:12px;width:30px;height:30px;border:none;background:rgba(13,74,86,.09);border-radius:50%;color:var(--petrol);font-size:18px;cursor:pointer;line-height:1;}
  .dsec{margin-bottom:13px;} .dsec .dh{font-weight:700;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--petrol);margin-bottom:4px;}
  .dsec ul{margin:0;padding-left:17px;} .dsec li{font-size:13px;line-height:1.5;margin-bottom:2px;} .dsec p{font-size:13px;line-height:1.5;}
  .dtip{background:rgba(200,148,31,.15);border-radius:9px;padding:9px 12px;font-size:12px;line-height:1.45;margin-top:4px;} .dtip b{color:#9a7212;}

  load(){try{const r=localStorage.getItem(KEY);this.data=r?JSON.parse(r):this.def();}catch(e){this.data=this._mem||this.def();}if(!this.data.plan)this.data.plan={};if(!this.data.food)this.data.food={};return this.data;},
  save(){try{localStorage.setItem(KEY,JSON.stringify(this.data));}catch(e){this._mem=this.data;}toast('elmentve');}};
let toastT=null;function toast(m){const t=document.getElementById('toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),900);}
function pad(n){return n<10?'0'+n:''+n;}
function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function weekKeyOf(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-dn+3);const f=new Date(Date.UTC(t.getUTCFullYear(),0,4));const wk=1+Math.round(((t-f)/86400000-3+((f.getUTCDay()+6)%7))/7);return t.getUTCFullYear()+'-W'+pad(wk);}
function mondayOf(d){const x=new Date(d);const dn=(x.getDay()+6)%7;x.setDate(x.getDate()-dn);x.setHours(0,0,0,0);return x;}
let weekOffset=0,foodDate=new Date(),cur='terv';
function wkObj(off){const d=new Date();d.setDate(d.getDate()+(off===undefined?weekOffset:off)*7);const k=weekKeyOf(d);if(!store.data.plan[k])store.data.plan[k]={done:{},skip:{},custom:{}};const o=store.data.plan[k];o.done=o.done||{};o.skip=o.skip||{};o.custom=o.custom||{};return o;}

function renderTerv(){
  const base=new Date();base.setDate(base.getDate()+weekOffset*7);
  const mon=mondayOf(base);const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const o=wkObj();const todayIdx=(new Date().getDay()+6)%7;

  const range=MON[mon.getMonth()]+' '+mon.getDate()+'–'+(sun.getMonth()!==mon.getMonth()?MON[sun.getMonth()]+' ':'')+sun.getDate();
  let done=0,html='<div class="weeknav"><button data-wk="-1">‹</button><div><div class="wlabel">'+label+'</div><div class="wsub">'+range+'</div></div><button data-wk="1">›</button></div>';
  PLAN.forEach((d,di)=>{
    const customs=(o.custom[di]||[]);const hasC=customs.length>0;const isT=weekOffset===0&&di===todayIdx;
    html+='<div class="day '+(d.tag==='rest'?'rest':'')+' '+(isT?'today':'')+'"><span class="dtag '+d.tag+'">'+d.day.slice(0,3)+'</span><div class="tasks">';
    d.tasks.forEach((tk,ti)=>{const id=di+'_'+ti;const on=!!o.done[id];const sk=!!o.skip[id];if(sk&&hasC)return;if(d.tag!=='rest'&&!sk&&on)done++;html+=taskHTML(id,tk.name,tk.set,on,sk,false,di);});
    customs.forEach(c=>{const on=!!o.done[c.id];if(on)done++;html+=taskHTML(c.id,c.name,c.set||'saját',on,false,true,di);});
    html+='<button class="addbtn" data-add="'+di+'">+</button></div></div>';
  });
  html+='<div class="wkgoal">Heti cél: <b>'+done+' / '+GOAL+'</b> mozgás</div><div class="hint">húzd a sort balra a kukához · a + alatta más mozgást ad</div>';
  document.getElementById('view-terv').innerHTML=html;
  document.querySelectorAll('#view-terv [data-wk]').forEach(b=>b.onclick=()=>{weekOffset+=parseInt(b.dataset.wk);renderTerv();});
  document.querySelectorAll('#view-terv .cbx').forEach(el=>el.onclick=e=>{e.stopPropagation();const o=wkObj();o.done[el.dataset.id]=!o.done[el.dataset.id];store.save();renderTerv();});
  document.querySelectorAll('#view-terv .restore').forEach(el=>el.onclick=()=>{const o=wkObj();o.skip[el.dataset.id]=false;store.save();renderTerv();});
  document.querySelectorAll('#view-terv .addbtn').forEach(el=>el.onclick=()=>openPicker(el.dataset.add));
  document.querySelectorAll('#view-terv .taskfg[data-swipe]').forEach(addRowSwipe);
  document.querySelectorAll('#view-terv .tmeta').forEach(el=>el.onclick=()=>openDetail(el.dataset.name,el.dataset.set));

function taskHTML(id,name,set,on,sk,isC,di){
  const restore=sk?'<button class="restore" data-id="'+id+'">'+ICON_AR+'vissza</button>':'';
  const cb=sk?'':'<div class="cbx '+(on?'on':'')+'" data-id="'+id+'">'+(on?'✓':'')+'</div>';
  return '<div class="taskwrap"><div class="trash"><span class="manem">ma nem</span></div><div class="taskfg '+(sk?'skip':'')+'" data-swipe="1" data-id="'+id+'" data-custom="'+(isC?1:0)+'" data-di="'+di+'">'+cb+'<div class="tmeta" data-name="'+esc(name)+'" data-set="'+esc(set)+'"><div class="tname">'+name+'</div><div class="tset">'+set+'</div></div>'+restore+'</div></div>';
}
function binTask(fg){const o=wkObj();const id=fg.dataset.id;if(fg.dataset.custom==='1'){const di=fg.dataset.di;o.custom[di]=(o.custom[di]||[]).filter(c=>c.id!==id);delete o.done[id];}else o.skip[id]=true;store.save();renderTerv();}
function addRowSwipe(fg){let x0=0,y0=0,drag=false,dec=false;
  fg.addEventListener('pointerdown',e=>{x0=e.clientX;y0=e.clientY;drag=true;dec=false;fg.style.transition='none';});
  fg.addEventListener('pointermove',e=>{if(!drag)return;const dx=e.clientX-x0,dy=e.clientY-y0;if(!dec){if(Math.abs(dx)>10||Math.abs(dy)>10){dec=true;if(Math.abs(dy)>Math.abs(dx)){drag=false;fg.style.transform='';return;}}}if(dec&&dx<0){e.preventDefault();fg.parentElement.classList.add('swiping');fg.style.transform='translateX('+Math.max(dx,-120)+'px)';}});
  fg.addEventListener('pointerup',e=>{const dx=e.clientX-x0;fg.style.transition='transform .16s';if(drag&&dx<-72){fg.style.transform='translateX(-115%)';setTimeout(()=>binTask(fg),130);}else{fg.style.transform='';fg.parentElement.classList.remove('swiping');}drag=false;});
  fg.addEventListener('pointercancel',()=>{fg.style.transition='transform .16s';fg.style.transform='';fg.parentElement.classList.remove('swiping');drag=false;});
}
function openPicker(di){const ov=document.getElementById('picker');let html='<div class="sheet"><h3>Mást csináltál?</h3><div class="sh-sub">Válassz egy alap-mozgást, vagy adj meg sajátot.</div>';

  html+='<div class="cancel" id="pcancel">Mégse</div></div>';ov.innerHTML=html;ov.classList.remove('hidden');

function dots(n,v,c){let s='';for(let i=0;i<n;i++)s+='<span class="dot '+c+' '+(i<v?'on':'')+'"></span>';return s;}
function dotsCarb(n,a,o){let s='';for(let i=0;i<n;i++){let c=i<a?'ca on':(i<a+o?'co on':'');s+='<span class="dot '+c+'"></span>';}return s;}

function weekDates(off){const d=new Date();d.setDate(d.getDate()+off*7);const m=mondayOf(d);const a=[];for(let i=0;i<7;i++){const x=new Date(m);x.setDate(x.getDate()+i);a.push(ymd(x));}return a;}
function weekMoves(off){const o=wkObj(off);let n=0;PLAN.forEach((d,di)=>{d.tasks.forEach((t,ti)=>{const id=di+'_'+ti;if(d.tag!=='rest'&&!(o.skip&&o.skip[id])&&o.done&&o.done[id])n++;});});if(o.custom)Object.values(o.custom).forEach(a=>a.forEach(c=>{if(o.done&&o.done[c.id])n++;}));return n;}
function weekFood(off){const ds=weekDates(off);let p=0,ca=0,co=0,w=0,sl=0,nd=0;ds.forEach(k=>{const f=store.data.food[k];if(f){nd++;p+=f.protein||0;ca+=f.carbA||0;co+=f.carbO||0;w+=f.water||0;sl+=f.slips?Object.values(f.slips).filter(Boolean).length:0;}});return{p,ca,co,w,sl,nd};}
function arrow(c,p){if(p==null)return '<span class="ar flat">·</span>';if(c>p+0.05)return '<span class="ar up">▲</span>';if(c<p-0.05)return '<span class="ar down">▼</span>';return '<span class="ar flat">=</span>';}
function last7(metric){const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const f=store.data.food[ymd(d)];let v=0;if(f){if(metric==='protein')v=f.protein||0;else if(metric==='carb')v=(f.carbA||0)+(f.carbO||0);else if(metric==='water')v=f.water||0;}a.push({v,today:i===0,lab:HUS[d.getDay()]});}return a;}
function renderStat(){
  const hasData=Object.values(store.data.food).some(f=>f.protein||f.carbA||f.carbO||f.water||(f.slips&&Object.values(f.slips).some(Boolean)))||Object.values(store.data.plan).some(o=>(o.done&&Object.values(o.done).some(Boolean))||(o.custom&&Object.values(o.custom).some(a=>a.length)));const total=hasData?1:0;
  let h='<div class="seclabel"><span class="tick"></span>Elmúlt 7 nap</div>';
  if(total===0){h+='<div class="chartcard empty">Még gyűlik az adat — pipálj és logolj pár napot, és itt megjelennek a trendek.</div>';document.getElementById('view-stat').innerHTML=h;return;}
  h+=chartBlock();
  // dimension cards
  const mv=weekMoves(0),mvP=weekMoves(-1),f0=weekFood(0),f1=weekFood(-1);
  const aP=f0.nd?f0.p/f0.nd:0,aPp=f1.nd?f1.p/f1.nd:0;const c0=f0.ca+f0.co,c0d=f0.nd?c0/f0.nd:0,c1d=f1.nd?(f1.ca+f1.co)/f1.nd:0;const pct=c0>0?Math.round(f0.ca/c0*100):0;const aW=f0.nd?f0.w/f0.nd:0,aWp=f1.nd?f1.w/f1.nd:0;
  h+=scard('Mozgás',mv+' / '+GOAL,arrow(mv,mvP),sMove(mv,mvP));
  h+=scard('Fehérje',aP.toFixed(1)+'<small> /nap</small>',arrow(aP,aPp),sProt(aP));
  h+=scard('Szénhidrát',c0d.toFixed(1)+'<small> /nap</small>',arrow(c0d,c1d),sCarb(c0d,pct,c0));
  h+=scard('Víz',aW.toFixed(1)+'<small> pohár</small>',arrow(aW,aWp),sWater(aW));
  h+=scard('Tiltólista',f0.sl+'<small> csúszás</small>',arrow(-f0.sl,-f1.sl),sBan(f0.sl));
  const wf=winFocus(mv,aP,c0d,pct,aW,f0.sl);h+='<div class="win"><div class="w1">🏆 '+wf[0]+'</div><div class="w2"><b>Fókusz jövő hétre:</b> '+wf[1]+'</div></div>';
  // 4 weeks
  h+='<div class="seclabel"><span class="tick"></span>4 teljes hét</div>';
  const wk=[3,2,1,0],moves=wk.map(weekMoves),foods=wk.map(weekFood);
  h+=mcard('Mozgás / hét',moves,GOAL,sMove4(moves));
  h+=mcard('Fehérje átlag',foods.map(f=>f.nd?f.p/f.nd:0),PROT_T,sAvg4('fehérje',foods.map(f=>f.nd?f.p/f.nd:0),PROT_T,'adag'));
  h+=mcard('Szénhidrát átlag',foods.map(f=>f.nd?(f.ca+f.co)/f.nd:0),CARB_T,sAvg4('szénhidrát',foods.map(f=>f.nd?(f.ca+f.co)/f.nd:0),CARB_T,'adag'));
  h+=mcard('Víz átlag',foods.map(f=>f.nd?f.w/f.nd:0),WATER_T,sAvg4('víz',foods.map(f=>f.nd?f.w/f.nd:0),WATER_T,'pohár'));
  h+=mcard('Csúszás / hét',foods.map(f=>f.sl),Math.max(3,...foods.map(f=>f.sl)),sSlip4(foods.map(f=>f.sl)));
  h+='<span class="savelink" id="exp">biztonsági mentés letöltése (opcionális)</span>';
  document.getElementById('view-stat').innerHTML=h;
  document.querySelectorAll('#view-stat .seg button').forEach(b=>b.onclick=()=>{statMetric=b.dataset.m;renderStat();});
  const ex=document.getElementById('exp');if(ex)ex.onclick=()=>{const b=new Blob([JSON.stringify(store.data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='mozgas-backup-'+ymd(new Date())+'.json';a.click();};
}
function scard(n,v,a,s){return '<div class="scard"><div class="srow"><span class="sname">'+n+'</span><span class="sval">'+v+' '+a+'</span></div><div class="ssent">'+s+'</div></div>';}
function mcard(n,vals,target,s){const max=Math.max(target,...vals,1);let b='';for(let i=0;i<vals.length;i++)b+='<div class="mb '+(i===vals.length-1?'cur':'')+'" style="height:'+Math.max(3,Math.round(vals[i]/max*100))+'%"></div>';return '<div class="scard"><div class="srow"><span class="sname">'+n+'</span></div><div class="mini">'+b+'</div><div class="mbl"><span>-3h</span><span>-2h</span><span>-1h</span><span>most</span></div><div class="ssent">'+s+'</div></div>';}
function sMove(m,p){if(m>=GOAL)return 'Megvan a heti 4 mozgás — tartod a ritmust, szép.';if(m>=GOAL-1)return 'Egy mozgásra a céltól — egy könnyű úszás bezárja a hetet.';if(m===0)return 'Még nincs bepipált mozgás — egy rövid úszással elindul.';return m+' mozgás eddig — '+(m>p?'jobb tempó, mint múlt héten.':'kicsit lemaradva, pótolható.');}
function sProt(a){if(a>=2.7)return 'Stabil ~3 adag fehérje naponta — pont a rekompozícióhoz kell.';if(a>=1.8)return 'Átlag '+a.toFixed(1)+' adag — emelj egyet (túró/skyr a leggyorsabb).';if(a>0)return 'Kevés fehérje ('+a.toFixed(1)+'/nap) — told 3 felé.';return 'Nincs fehérje-adat — egy koppintás étkezésenként elég.';}
function sCarb(d,p,t){if(t===0)return 'Nincs szénhidrát-adat — edzés köré a leghasznosabb.';if(p>=60)return 'A szénhidrát '+p+'%-a edzés köré esett — jó időzítés.';return 'Átlag '+d.toFixed(1)+' adag, '+p+'% edzés köré — told a mozgás köré.';}
function sWater(a){if(a>=8)return 'Jó hidratáltság (~'+a.toFixed(0)+' pohár) — tartsd, főleg úszónapon.';if(a>0)return 'Átlag '+a.toFixed(1)+' pohár — pár pohárral több férne bele.';return 'Nincs víz-adat — uszodában könnyű alábecsülni.';}
function sBan(s){if(s===0)return 'Tiszta hét — nulla csúszás, ez nagy.';if(s<=2)return 'Csak '+s+' csúszás — kontroll alatt.';return s+' csúszás — nézd meg, melyik nap gyűlik.';}
function winFocus(mv,p,c,pct,w,sl){const wins=[];if(mv>=GOAL)wins.push('Megvolt mind a 4 mozgás');if(p>=2.7)wins.push('Tartottad a fehérjét');if(sl===0)wins.push('Nulla tiltólista-csúszás');if(pct>=60&&c>0)wins.push('Jól időzített szénhidrát');if(w>=8)wins.push('Jó hidratáltság');const win=wins.length?wins[0]+'.':'Elindult a követés — ez már fél siker.';let f;if(mv<GOAL)f='zárd be a heti 4. mozgást.';else if(p<2.7)f='egy plusz fehérje-adag naponta.';else if(pct<60&&c>0)f='told a szénhidrátot edzés köré.';else if(w<8)f='+2 pohár víz naponta.';else if(sl>2)f='egy tiltólista-tétellel kevesebb.';else f='tartsd, amit csinálsz — és aludj szabályosan.';return[win,f];}
function sMove4(a){const t=a[3],p=a[2];if(t>=GOAL&&p>=GOAL)return 'Két hete megvan a 4 — ez már szokás.';if(t>p)return 'Felfelé tartó mozgás-trend.';if(t<p)return 'Az e heti mozgás elmarad — egy kis ráhúzás kell.';return 'Egyenletes mozgás-tempó.';}
function sAvg4(n,a,t,u){const c=a[3],p=a[2];const dir=c>p+0.1?'emelkedő':(c<p-0.1?'csökkenő':'stabil');return 'A '+n+' '+dir+' trend ('+c.toFixed(1)+' '+u+'/nap), cél ~'+t+'.';}
function sSlip4(a){const t=a[3],p=a[2];if(t===0)return 'Tiszta hét — nulla csúszás.';if(t<p)return 'Kevesebb csúszás, mint korábban — jó irány.';if(t>p)return 'Több csúszás — keress kiváltót.';return 'A csúszások szintje állandó.';}

  const el=document.getElementById('view-'+v);if(dir){el.style.setProperty('--dir',dir>0?'24px':'-24px');el.classList.remove('view');void el.offsetWidth;el.classList.add('view');}
  if(v==='terv')renderTerv();if(v==='kaja')renderKaja();if(v==='stat')renderStat();}
function step(d){const i=VIEWS.indexOf(cur),n=i+d;if(n<0||n>=VIEWS.length)return;show(VIEWS[n],d);}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v,VIEWS.indexOf(b.dataset.v)>VIEWS.indexOf(cur)?1:-1));
(function(){let x0=0,y0=0,track=false,onRow=false;const app=document.getElementById('app');
  app.addEventListener('pointerdown',e=>{x0=e.clientX;y0=e.clientY;track=true;onRow=!!(e.target.closest&&e.target.closest('.taskwrap'));});
  app.addEventListener('pointerup',e=>{if(!track)return;track=false;if(onRow)return;const dx=e.clientX-x0,dy=e.clientY-y0;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.4)step(dx<0?1:-1);});})();
store.load();show('terv');
</script>
</body>
